<!doctype html>
<html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; font-family: var(--font-sans); background:#fff; display:flex; flex-direction:column; gap:14px;}
  .panel { display:flex; align-items:center; gap:18px; padding:14px 18px; border:1px solid var(--sm-gray-200); border-radius:12px;}
  .panel.cream { background: var(--color-header-bg-1);}
  .panel.dark { background: var(--sm-gray-900); border-color:transparent; color:#fff;}
  .lbl { font-family: var(--font-mono); font-size:11px; color:var(--sm-gray-500); margin-left:auto;}
</style></head>
<body>
  <div class="panel"><img src="../assets/logo-wordmark.svg" height="40" alt="Strawberry Matcha"/><span class="lbl">on white</span></div>
  <div class="panel cream"><img src="../assets/logo-wordmark.svg" height="40" alt="Strawberry Matcha"/><span class="lbl">on cream-100</span></div>
  <div class="panel"><img src="../assets/app-icon.svg" height="48" alt="Strawberry Matcha icon"/><span class="lbl">app-icon · 64×64</span></div>
</body></html>
