<!doctype html>
<html><head><meta charset="utf-8"><title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .row { display:grid; grid-template-columns: repeat(8, 1fr); gap:8px; margin-bottom:14px;}
  .swatch { border-radius: 10px; height: 56px; display:flex; align-items:flex-end; padding:6px 8px; color:#fff; font-size:11px; font-weight:600; box-shadow: 0 1px 2px rgba(0,0,0,.06);}
  .lbl { font-size:11px; color:var(--sm-gray-600); margin: 2px 4px 8px; letter-spacing:.02em;}
  .group-title { font-size:12px; font-weight:600; letter-spacing:.06em; color:var(--sm-gray-700); text-transform:uppercase; margin: 0 4px 6px;}
  .dark { color:var(--sm-gray-800); }
</style></head>
<body>
  <div class="group-title">Strawberry</div>
  <div class="row">
    <div class="swatch dark" style="background:#fff1f4">50</div>
    <div class="swatch dark" style="background:#ffe4e6">100</div>
    <div class="swatch" style="background:#ffadc2">200</div>
    <div class="swatch" style="background:#ff8fab">300</div>
    <div class="swatch" style="background:#ff6b9d">400</div>
    <div class="swatch" style="background:#f472b6">500</div>
    <div class="swatch" style="background:#ec4899">600</div>
    <div class="swatch" style="background:#be185d">700</div>
  </div>
  <div class="group-title" style="margin-top:8px">Matcha</div>
  <div class="row">
    <div class="swatch dark" style="background:#f0f7ec">50</div>
    <div class="swatch dark" style="background:#e8f5e8">100</div>
    <div class="swatch dark" style="background:#bbf7d0">200</div>
    <div class="swatch" style="background:#94b894">300</div>
    <div class="swatch" style="background:#8bc34a">400</div>
    <div class="swatch" style="background:#4ade80">500</div>
    <div class="swatch" style="background:#22c55e">600</div>
    <div class="swatch" style="background:#16a34a">700</div>
  </div>
</body></html>
