<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; }
  .row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; background:#f9fafb;}
  .chip { width:36px; height:36px; border-radius:10px; box-shadow:inset 0 0 0 1px rgba(0,0,0,.06); flex-shrink:0;}
  .name { font-size:12px; font-weight:600; color:#1f2937;}
  .val { font-family: var(--font-mono); font-size:11px; color:#6b7280;}
</style></head>
<body>
  <div class="grid">
    <div class="row"><div class="chip" style="background:#ec4899"></div><div><div class="name">link</div><div class="val">#ec4899</div></div></div>
    <div class="row"><div class="chip" style="background:#16a34a"></div><div><div class="name">link-alt</div><div class="val">#16a34a</div></div></div>
    <div class="row"><div class="chip" style="background:#f472b6"></div><div><div class="name">icon-primary</div><div class="val">#f472b6</div></div></div>
    <div class="row"><div class="chip" style="background:#22c55e"></div><div><div class="name">icon-secondary</div><div class="val">#22c55e</div></div></div>
    <div class="row"><div class="chip" style="background:#9ca3af"></div><div><div class="name">icon-muted</div><div class="val">#9ca3af</div></div></div>
    <div class="row"><div class="chip" style="background:#1f2937"></div><div><div class="name">text-strong</div><div class="val">#1f2937</div></div></div>
    <div class="row"><div class="chip" style="background:#4b5563"></div><div><div class="name">text-muted</div><div class="val">#4b5563</div></div></div>
    <div class="row"><div class="chip" style="background:#bbf7d0"></div><div><div class="name">success-bg</div><div class="val">#bbf7d0</div></div></div>
    <div class="row"><div class="chip" style="background:#ffe4e6"></div><div><div class="name">card-border</div><div class="val">#ffe4e6</div></div></div>
    <div class="row"><div class="chip" style="background:#ef4444"></div><div><div class="name">destructive</div><div class="val">#ef4444</div></div></div>
  </div>
</body></html>
