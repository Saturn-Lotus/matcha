<!doctype html>
<html><head><meta charset="utf-8"><title>Brand gradients</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .stack { display:flex; flex-direction:column; gap:10px;}
  .band { height:48px; border-radius:10px; display:flex; align-items:center; padding:0 14px; color:#fff; font-weight:700; font-size:13px; box-shadow: 0 4px 14px rgba(244,114,182,.18);}
  .band.text { background: var(--color-header-bg-1); color:var(--sm-gray-800); justify-content:space-between;}
  .label { font-family: var(--font-mono); font-size:11px; opacity:.85; font-weight:500;}
  .pageBg { height:48px; border-radius:10px; padding:0 14px; display:flex; align-items:center; justify-content:space-between;}
</style></head>
<body>
  <div class="stack">
    <div class="band strawberry-btn"><span>.strawberry-btn</span><span class="label">strawberry-400 → strawberry-300</span></div>
    <div class="band matcha-btn"><span>.matcha-btn</span><span class="label">matcha-400 → strawberry-300</span></div>
    <div class="band strawberry-matcha-btn"><span>.strawberry-matcha-btn</span><span class="label">strawberry-400 → matcha-400 → strawberry-300</span></div>
    <div class="pageBg strawberry-matcha-bg" style="border:1px solid var(--sm-gray-200);">
      <span style="font-weight:700;color:var(--sm-gray-800);">.strawberry-matcha-bg</span>
      <span class="label" style="color:var(--sm-gray-600)">cream → matcha → cream → lavender</span>
    </div>
    <div class="band text" style="font-size:18px;">
      <span class="strawberry-matcha-gradient" style="font-weight:800;">Strawberry Matcha gradient text</span>
      <span class="label">.strawberry-matcha-gradient</span>
    </div>
  </div>
</body></html>
