<!doctype html>
<html><head><meta charset="utf-8"><title>Type — display & body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); color: var(--sm-gray-800);}
  .row { display:flex; align-items:baseline; gap:14px; padding:8px 0; border-bottom: 1px solid var(--sm-gray-100);}
  .row:last-child{border-bottom:none;}
  .meta { font-family: var(--font-mono); font-size:11px; color:var(--sm-gray-500); width:140px; flex-shrink:0;}
</style></head>
<body>
  <div class="row"><div class="meta">hero · 60 / 700</div><div style="font-size:60px;font-weight:700;line-height:1;" class="strawberry-matcha-gradient">Sweet Connections</div></div>
  <div class="row"><div class="meta">h1 · 30 / 700</div><div style="font-size:30px;font-weight:700;">Welcome back</div></div>
  <div class="row"><div class="meta">h2 · 24 / 700</div><div style="font-size:24px;font-weight:700;">Edit your profile</div></div>
  <div class="row"><div class="meta">h3 · 20 / 600</div><div style="font-size:20px;font-weight:600;">Sweet Matching</div></div>
</body></html>
