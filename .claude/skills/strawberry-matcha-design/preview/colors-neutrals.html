<!doctype html>
<html><head><meta charset="utf-8"><title>Cream & neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .row { display:grid; grid-template-columns: repeat(10, 1fr); gap:8px; margin-bottom:14px;}
  .swatch { border-radius: 10px; height: 56px; display:flex; align-items:flex-end; padding:6px 8px; font-size:11px; font-weight:600; box-shadow: 0 1px 2px rgba(0,0,0,.06); border:1px solid rgba(0,0,0,.04);}
  .group-title { font-size:12px; font-weight:600; letter-spacing:.06em; color:var(--sm-gray-700); text-transform:uppercase; margin: 0 4px 6px;}
</style></head>
<body>
  <div class="group-title">Cream (page backgrounds)</div>
  <div class="row" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch" style="background:#fbf9f8;color:#374151">cream-50<br>#fbf9f8</div>
    <div class="swatch" style="background:#f8f5f2;color:#374151">cream-100<br>#f8f5f2</div>
    <div class="swatch" style="background:#fce7e7;color:#374151">cream-200<br>#fce7e7</div>
    <div class="swatch" style="background:#f5f0f8;color:#374151">cream-300<br>#f5f0f8</div>
  </div>
  <div class="group-title" style="margin-top:6px">Gray</div>
  <div class="row">
    <div class="swatch" style="background:#f9fafb;color:#374151">50</div>
    <div class="swatch" style="background:#f3f4f6;color:#374151">100</div>
    <div class="swatch" style="background:#e5e7eb;color:#374151">200</div>
    <div class="swatch" style="background:#d1d5db;color:#374151">300</div>
    <div class="swatch" style="background:#9ca3af;color:#fff">400</div>
    <div class="swatch" style="background:#6b7280;color:#fff">500</div>
    <div class="swatch" style="background:#4b5563;color:#fff">600</div>
    <div class="swatch" style="background:#374151;color:#fff">700</div>
    <div class="swatch" style="background:#1f2937;color:#fff">800</div>
    <div class="swatch" style="background:#111827;color:#fff">900</div>
  </div>
</body></html>
